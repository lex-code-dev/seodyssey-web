<aside class="hidden lg:flex lg:flex-col w-72 shrink-0 border-r border-slate-200 bg-white">
  <div class="px-6 py-5 border-b border-slate-200">
    <a href="{% url 'dashboard' %}" class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-2xl bg-emerald-600 flex items-center justify-center text-white font-semibold">O</div>
      <div>
        <div class="text-lg font-semibold leading-none">SEOdyssey</div>
        <div class="text-xs text-slate-500 mt-1">там, где начинается рост</div>
      </div>
    </a>
  </div>

  <nav class="px-3 py-4 space-y-1 text-sm">
    <a href="{% url 'dashboard' %}" class="navlink {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Обзор</a>
    <a href="{% url 'sites' %}" class="navlink {% if request.resolver_match.url_name in 'sites site_new site_checks' %}active{% endif %}">Сайты</a>
    <a href="{% url 'alerts' %}" class="navlink {% if request.resolver_match.url_name in 'alerts alert_detail' %}active{% endif %}">Алерты</a>
    <a href="{% url 'reports' %}" class="navlink {% if request.resolver_match.url_name in 'reports report_detail' %}active{% endif %}">Отчёты</a>
    <a href="{% url 'integrations' %}" class="navlink {% if request.resolver_match.url_name == 'integrations' %}active{% endif %}">Интеграции</a>

    <div class="pt-3 mt-3 border-t border-slate-200"></div>

    <a href="{% url 'billing' %}" class="navlink {% if request.resolver_match.url_name == 'billing' %}active{% endif %}">Тариф и оплата</a>
    <a href="{% url 'team' %}" class="navlink {% if request.resolver_match.url_name == 'team' %}active{% endif %}">Команда</a>
    <a href="{% url 'user_settings' %}" class="navlink {% if request.resolver_match.url_name == 'user_settings' %}active{% endif %}">Настройки</a>
    <a href="{% url 'help' %}" class="navlink {% if request.resolver_match.url_name == 'help' %}active{% endif %}">Помощь</a>
  </nav>

  <div class="mt-auto px-6 py-4 border-t border-slate-200">
    <div class="flex items-center gap-3">
      <div class="h-9 w-9 rounded-full bg-slate-200"></div>
      <div class="min-w-0">
        <div class="text-sm font-semibold truncate">{{ request.user.get_username }}</div>
        <div class="text-xs text-slate-500 truncate">{{ request.user.email|default:"" }}</div>
      </div>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="ml-auto text-xs text-slate-500 hover:text-slate-700" type="submit">Выйти</button>
      </form>
    </div>
  </div>
</aside>
