{% if messages %}
  <div class="space-y-2 mb-5">
    {% for message in messages %}
      <div class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="font-semibold">
            {% if message.tags %}{{ message.tags|upper }}{% else %}INFO{% endif %}
          </div>
          <div class="text-slate-700 mt-1">{{ message }}</div>
        </div>
        <span class="text-xs text-slate-500 whitespace-nowrap">{{ now|date:"d.m.Y" }}</span>
      </div>
    {% endfor %}
  </div>
{% endif %}
